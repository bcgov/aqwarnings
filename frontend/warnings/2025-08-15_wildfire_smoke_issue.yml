customMessage: Over the next 24 hours, smoke may also be visible in
  areas adjacent to the regions currently issued under this warning. 
  Additionally, smoke from wildfires in the United States may impact air
  quality in across southeastern B.C. today through tomorrow morning.
  Smoke levels in the southeast may be elevated for a few hours, but are
  not expected to persistent enough to trigger an air quality warning
  for regions in this part of the province. 
